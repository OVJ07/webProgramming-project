<!DOCTYPE html>
<html>
<head>
    <title>Attendance Tracker - Student Productivity Dashboard</title>
    <link rel="stylesheet" href="attendance.css" />
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div>
            <h1>Attendance Tracker</h1>
            <p>Student Productivity Dashboard &nbsp;|&nbsp; Module 2</p>
        </div>
        <div id="headerDate"></div>
    </div>

    <!-- OVERALL ATTENDANCE -->
    <div class="overall-section" id="overallSection" style="display:none;">
        <div>
            <h3>Overall Attendance</h3>
            <span id="overallPct">0%</span>
            <p id="overallDetail"></p>
        </div>
    </div>

    <!-- ADD SUBJECT FORM -->
    <div class="form-section">
        <h2>Add New Subject</h2>
        <div class="form-row">
            <div class="form-group">
                <label for="subjectName">Subject Name</label>
                <input type="text" id="subjectName" placeholder="e.g. Mathematics" />
            </div>
            <div class="form-group">
                <label for="totalClasses">Total Classes</label>
                <input type="number" id="totalClasses" placeholder="e.g. 40" min="1" />
            </div>
            <div class="form-group">
                <label for="attendedClasses">Classes Attended</label>
                <input type="number" id="attendedClasses" placeholder="e.g. 32" min="0" />
            </div>
            <button class="btn-add" onclick="addSubject()">+ Add Subject</button>
        </div>
    </div>

    <!-- SUBJECT CARDS -->
    <div class="cards-section" id="cardsSection">
        <div class="empty-msg">No subjects added yet. Add a subject above to get started.</div>
    </div>

    <div class="footer">
        Student Productivity Dashboard &nbsp;&mdash;&nbsp; Attendance Tracker &nbsp;&mdash;&nbsp; Data saved in LocalStorage
    </div>

    <script src="attendance.js"></script>

</body>
</html>
