<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Countdown</title>
    <link rel="stylesheet" href="../css/exam.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="exam-container">
        <div class="exam-header">
            <h1><i class="fas fa-calendar-alt"></i> Exam Countdown</h1>
            <p>Track your upcoming exams and stay prepared</p>
        </div>

        <!-- Add Exam Form -->
        <div class="exam-form">
            <h2>Add New Exam</h2>
            <form id="addExamForm">
                <div class="form-group">
                    <label for="examName">Exam Name</label>
                    <input type="text" id="examName" placeholder="Enter exam name" required>
                </div>
                <div class="form-group">
                    <label for="examDate">Exam Date</label>
                    <input type="date" id="examDate" required>
                </div>
                <button type="submit" class="btn-primary"><i class="fas fa-plus"></i> Add Exam</button>
            </form>
        </div>

        <!-- Exams List -->
        <div class="exams-list">
            <h2>Your Exams</h2>
            <div id="examsContainer" class="exams-container">
                <!-- Exams will be loaded here dynamically -->
            </div>
        </div>
    </div>

    <script src="../js/exam.js"></script>
    <script>
        // Initialize the exam module
        document.addEventListener('DOMContentLoaded', function() {
            loadExams();
            setupForm();
        });

        function setupForm() {
            const form = document.getElementById('addExamForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                addExam();
            });
        }

        function addExam() {
            const name = document.getElementById('examName').value;
            const date = document.getElementById('examDate').value;
            
            if (name && date) {
                const exam = {
                    id: Date.now(),
                    name: name,
                    date: date
                };
                
                saveExam(exam);
                loadExams();
                
                // Reset form
                document.getElementById('examName').value = '';
                document.getElementById('examDate').value = '';
            }
        }

        function loadExams() {
            const exams = getExams();
            const container = document.getElementById('examsContainer');
            
            if (exams.length === 0) {
                container.innerHTML = '<p class="no-exams">No exams added yet. Add your first exam above!</p>';
                return;
            }
            
            container.innerHTML = '';
            
            exams.forEach(exam => {
                const daysLeft = calculateDaysLeft(exam.date);
                const examCard = document.createElement('div');
                examCard.className = 'exam-card';
                examCard.innerHTML = `
                    <div class="exam-details">
                        <h3>${exam.name}</h3>
                        <p class="exam-date">Exam Date: ${new Date(exam.date).toLocaleDateString()}</p>
                        <p class="days-left">Days remaining: <strong>${daysLeft}</strong></p>
                    </div>
                    <button class="btn-delete" onclick="deleteExam(${exam.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                container.appendChild(examCard);
            });
        }

        function deleteExam(id) {
            if (confirm('Are you sure you want to delete this exam?')) {
                removeExam(id);
                loadExams();
            }
        }
    </script>
</body>
</html>
