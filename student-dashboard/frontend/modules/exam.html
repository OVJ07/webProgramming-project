<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Countdown - Student Dashboard</title>
  
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/exam.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="container">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>Student Dashboard</h2>
      </div>
      <ul class="sidebar-menu">
        <li><a href="../index.html">Dashboard</a></li>
        <li><a href="task.html">Task Planner</a></li>
        <li><a href="attendance.html">Attendance</a></li>
        <li><a href="timer.html">Timer</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="exam.html" class="active">Exam Countdown</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>

    <!-- Main -->
    <main class="main-content">

      <div class="dashboard-header">
        <h1><i class="fas fa-calendar-alt"></i> Exam Countdown</h1>
        <div class="user-info">
          <span id="user-email">student@example.com</span>
        </div>
      </div>

      <div class="exam-container">

        <!-- Exam Form -->
        <div class="exam-form">
          <h2>Add New Exam</h2>

          <div class="form-group">
            <label>Exam Name</label>
            <input type="text" id="examName" placeholder="Enter exam name">
          </div>

          <div class="form-group">
            <label>Exam Date</label>
            <input type="date" id="examDate">
          </div>

          <!-- Description -->
          <div class="form-group">
            <label>Description</label>
            <textarea id="examDescription" placeholder="Optional"></textarea>
          </div>

          <button class="btn btn-primary" id="addExamBtn">
            <i class="fas fa-plus"></i> Add Exam
          </button>
        </div>

        <!-- Exams List -->
        <div class="exams-list">
          <h2>Your Exams</h2>

          <div id="examsContainer" class="exams-container">
            <p>Loading exams...</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/exam.js"></script>

  <!-- Custom Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadExams();

      document.getElementById('addExamBtn').addEventListener('click', addExam);
    });

    // Load exams
    async function loadExams() {
      const exams = await getExams(); // backend call
      const container = document.getElementById('examsContainer');

      if (!exams || exams.length === 0) {
        container.innerHTML = '<p class="no-exams">No exams added yet.</p>';
        return;
      }

      container.innerHTML = '';

      exams.forEach(exam => {
        const daysLeft = calculateDaysLeft(exam.date);

        const examCard = document.createElement('div');
        examCard.className = 'exam-card';

        examCard.innerHTML = `
          <div class="exam-details">
            <h3>${exam.subject}</h3>
            <p>Exam Date: ${new Date(exam.date).toLocaleDateString()}</p>
            <p>Days remaining: <strong>${daysLeft}</strong></p>
            ${exam.description ? `<p>${exam.description}</p>` : ''}
          </div>

          <button class="btn-delete" onclick="deleteExam('${exam._id}')">
            <i class="fas fa-trash"></i>
          </button>
        `;

        container.appendChild(examCard);
      });
    }

    // Add exam
    async function addExam() {
      const name = document.getElementById('examName').value;
      const date = document.getElementById('examDate').value;
      const description = document.getElementById('examDescription').value;

      if (!name || !date) {
        alert('Please fill all required fields');
        return;
      }

      await createExam(name, date, description);

      // reset
      document.getElementById('examName').value = '';
      document.getElementById('examDate').value = '';
      document.getElementById('examDescription').value = '';

      loadExams();
    }

  
  </script>

</body>
</html>
