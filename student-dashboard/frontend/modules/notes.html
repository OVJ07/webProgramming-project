<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes - Student Dashboard</title>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/notes.css">
</head>
<body>

  <div class="container">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>Student Dashboard</h2>
      </div>

      <ul class="sidebar-menu">
        <li><a href="../index.html">Dashboard</a></li>
        <li><a href="task.html">Task Planner</a></li>
        <li><a href="attendance.html">Attendance</a></li>
        <li><a href="timer.html">Timer</a></li>
        <li><a href="notes.html" class="active">Notes</a></li>
        <li><a href="exam.html">Exam Countdown</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>

    <!-- Main -->
    <main class="main-content">

      <div class="dashboard-header">
        <h1>Notes</h1>
        <div class="user-info">
          <span id="user-email">student@example.com</span>
        </div>
      </div>

      <div class="notes-container">

        <!-- Filter by Subject -->
        <div class="filter-section">
          <label>Filter by Subject:</label>
          <select id="subject-filter">
            <option value="">All Subjects</option>
            <option value="WEBDEV">Web Development</option>
            <option value="CAO">CAO</option>
            <option value="PROBABILITY">Probability</option>
            <option value="DAA">DAA</option>
            <option value="TOC">TOC</option>
            <option value="MPMC">MPMC</option>
          </select>
        </div>

        <!-- Form -->
        <div class="notes-form">
          <h3>Add New Note</h3>

          <div class="form-group">
            <label>Title</label>
            <input type="text" id="note-title" placeholder="Note title">
          </div>

          <div class="form-group">
            <label>Subject Type</label>
            <select id="note-subject" required>
              <option value="">Select a subject</option>
              <option value="WEBDEV">Web Development</option>
              <option value="CAO">CAO</option>
              <option value="PROBABILITY">Probability</option>
              <option value="DAA">DAA</option>
              <option value="TOC">TOC</option>
              <option value="MPMC">MPMC</option>
            </select>
          </div>

          <div class="form-group">
            <label>Content</label>
            <textarea id="note-content" placeholder="Note content"></textarea>
          </div>

          <button class="btn btn-primary" id="add-note-btn">
            Add Note
          </button>
        </div>

        <!-- Notes list -->
        <div class="notes-list" id="notes-list">
          <p>Loading notes...</p>
        </div>

      </div>
    </main>

  </div>

  <!-- ✅ IMPORTANT -->
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/notes.js"></script>

</body>
</html>
