<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Planner - Student Dashboard</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/task.css">
</head>
<body>
  <div class="container">
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>Student Dashboard</h2>
      </div>
      <ul class="sidebar-menu">
        <li><a href="../index.html">Dashboard</a></li>
        <li><a href="task.html" class="active">Task Planner</a></li>
        <li><a href="attendance.html">Attendance</a></li>
        <li><a href="timer.html">Timer</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="exam.html">Exam Countdown</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="dashboard-header">
        <h1>Task Planner</h1>
        <div class="user-info">
          <span id="user-email">student@example.com</span>
        </div>
      </div>

      <div class="task-planner">
        <div class="form-container">
          <h3>Add New Task</h3>
          <div class="form-group">
            <label for="task-title">Title</label>
            <input type="text" id="task-title" placeholder="Task title">
          </div>
          <div class="form-group">
            <label for="task-description">Description</label>
            <textarea id="task-description" placeholder="Task description"></textarea>
          </div>
          <div class="form-group">
            <label for="task-due-date">Due Date</label>
            <input type="date" id="task-due-date">
          </div>
          <button class="btn btn-primary" id="add-task-btn">Add Task</button>
        </div>

        <div class="task-list" id="task-list">
          <!-- Tasks will be loaded here -->
          <p>Loading tasks...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/task.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
