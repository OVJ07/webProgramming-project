<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer - Student Dashboard</title>

  <!-- ✅ KEEP BOTH -->
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/timer.css">
</head>
<body>

  <div class="container">

    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>Student Dashboard</h2>
      </div>

      <ul class="sidebar-menu">
        <li><a href="../index.html">Dashboard</a></li>
        <li><a href="task.html">Task Planner</a></li>
        <li><a href="attendance.html">Attendance</a></li>
        <li><a href="timer.html" class="active">Timer</a></li>
        <li><a href="notes.html">Notes</a></li>
        <li><a href="exam.html">Exam Countdown</a></li>
        <li><a href="#" id="logout-btn">Logout</a></li>
      </ul>
    </nav>

    <!-- Main -->
    <main class="main-content">

      <div class="dashboard-header">
        <h1>Pomodoro Timer</h1>
        <div class="user-info">
          <span id="user-email">student@example.com</span>
        </div>
      </div>

      <div class="timer-container">

        <!-- Timer -->
        <div class="timer-display" id="timer">25:00</div>

        <!-- Controls -->
        <div class="timer-controls">
          <button class="timer-btn start" id="start-btn">Start</button>
          <button class="timer-btn pause" id="pause-btn" disabled>Pause</button>
          <button class="timer-btn reset" id="reset-btn">Reset</button>
        </div>

        <!-- Session Info -->
        <div class="timer-session">
          <h3>Current Session</h3>
          <p id="session-type">Focus Time</p>
          <p id="session-count">Session 1</p>

          <div class="timer-progress">
            <div class="timer-progress-bar" id="progress-bar"></div>
          </div>
        </div>

        <!-- ✅ KEEP THIS (from 1st HTML) -->
        <div class="timer-total">
          Total Studied: <span id="totalTime">0</span> sec
        </div>

      </div>
    </main>
  </div>

  <!-- ✅ IMPORTANT ORDER -->
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/timer.js"></script>

</body>
</html>
